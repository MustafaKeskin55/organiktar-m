<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proje Tanıtım HTML Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #09090b;
            color: #f4f4f5;
        }
        /* Özel Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #18181b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #3f3f46; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #52525b; 
        }
    </style>
</head>
<body class="h-screen flex flex-col antialiased">
    <!-- Header -->
    <header class="bg-zinc-900 border-b border-zinc-800 p-4 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center text-white font-bold text-xl shadow-[0_0_15px_rgba(52,211,153,0.3)]">
                &lt;/&gt;
            </div>
            <div>
                <h1 class="text-xl font-bold text-white">Proje Tanıtım Paneli</h1>
                <p class="text-xs text-zinc-400">Canlı HTML Geliştirme Ortamı</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button id="clear-btn" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-4 py-2 rounded-xl transition-colors border border-zinc-700 text-zinc-300">
                Temizle
            </button>
            <button id="copy-btn" class="bg-emerald-600 hover:bg-emerald-500 text-sm font-semibold px-4 py-2 rounded-xl transition-colors text-white shadow-lg shadow-emerald-900/20">
                Kodu Kopyala
            </button>
        </div>
    </header>

    <!-- Main Content: İkiye Bölünmüş Ekran -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        <!-- Sol: Kod Editörü -->
        <div class="w-full md:w-1/2 flex flex-col border-r border-zinc-800 bg-zinc-950">
            <div class="bg-zinc-900 px-4 py-3 border-b border-zinc-800 flex justify-between items-center">
                <span class="text-xs font-semibold text-zinc-400 uppercase tracking-wider flex items-center gap-2">
                    <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    HTML Editörü
                </span>
            </div>
            <textarea id="html-input" class="flex-1 bg-transparent text-emerald-400 font-mono text-[15px] p-6 outline-none resize-none leading-relaxed" spellcheck="false" placeholder="<!-- Projenizin HTML kodlarını buraya yazın -->&#10;<style>&#10;  body { font-family: system-ui, sans-serif; background: #f9fafb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }&#10;  .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); text-align: center; }&#10;  h1 { color: #111827; margin-top: 0; }&#10;  p { color: #4b5563; }&#10;</style>&#10;&#10;<div class='card'>&#10;  <h1>Yeni Proje Adı</h1>&#10;  <p>Bu alana projenizin tanıtım içeriği gelecek.</p>&#10;</div>"></textarea>
        </div>

        <!-- Sağ: Canlı Önizleme -->
        <div class="w-full md:w-1/2 flex flex-col bg-white">
            <div class="bg-zinc-900 px-4 py-3 border-b border-zinc-800 flex justify-between items-center">
                <span class="text-xs font-semibold text-zinc-400 uppercase tracking-wider flex items-center gap-2">
                    <svg class="w-4 h-4 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    Canlı Önizleme
                </span>
                <span class="flex items-center gap-1.5">
                    <span class="relative flex h-2 w-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span class="text-[10px] text-zinc-300">Anlık Senkronize</span>
                </span>
            </div>
            <iframe id="html-output" class="flex-1 w-full h-full border-none bg-white"></iframe>
        </div>
    </main>

    <script>
        const htmlInput = document.getElementById('html-input');
        const htmlOutput = document.getElementById('html-output');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-btn');

        // Varsayılan placeholder değerini textarea'ya doldur (eğer boşsa)
        if (!htmlInput.value) {
            htmlInput.value = htmlInput.getAttribute('placeholder');
        }

        // Canlı önizlemeyi güncelleyen fonksiyon
        function updatePreview() {
            const code = htmlInput.value;
            // iframe'in srcdoc özelliğini kullanarak HTML'i güvenli ve izole şekilde render ederiz
            htmlOutput.srcdoc = code;
        }

        // Kullanıcı yazdıkça önizlemeyi güncelle (Performans için debounce uygulandı)
        let timeout;
        htmlInput.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(updatePreview, 250); // 250ms bekleyip günceller
        });

        // Sayfa yüklendiğinde ilk önizlemeyi oluştur
        updatePreview();

        // Kodu Kopyala Butonu
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(htmlInput.value).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = 'Kopyalandı! ✓';
                copyBtn.classList.replace('bg-emerald-600', 'bg-teal-600');
                
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.classList.replace('bg-teal-600', 'bg-emerald-600');
                }, 2000);
            });
        });

        // Temizle Butonu
        clearBtn.addEventListener('click', () => {
            if(confirm('Editörü temizlemek istediğinize emin misiniz?')) {
                htmlInput.value = '';
                updatePreview();
                htmlInput.focus();
            }
        });
    </script>
</body>
</html>
